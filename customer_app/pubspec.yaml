name: customer_app
description: MrBar — Promotions, raffles and rewards for venue customers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: 14.6.2

  # HTTP
  dio: ^5.7.0

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # QR Scanner
  mobile_scanner: ^6.0.4

  # Firebase / Push notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.2

  # Location
  geolocator: ^13.0.2
  permission_handler: ^11.3.1

  # Map
  flutter_map: ^7.0.1
  latlong2: ^0.9.1

  # Utils
  intl: ^0.20.1
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
