name: customer_app
description: MrBar — Promotions, raffles and rewards for venue customers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: 14.6.2

  # HTTP
  dio: ^5.7.0

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # QR Scanner
  mobile_scanner: ^6.0.4

  # Utils
  intl: ^0.20.1
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
